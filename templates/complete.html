{% extends "base.html" %}

{% block content %}

<!-- SUCCESS CARD -->

<section style="
    max-width:900px;
    margin:0 auto;
">

    <div class="hero-card" style="
        text-align:center;
        padding:60px 40px;
    ">

        <!-- EMOJI -->

        <div style="
            font-size:5rem;
            margin-bottom:20px;
        ">
            🎉
        </div>


        <!-- TITLE -->

        <p style="
            color:#9ca3af;
            margin-bottom:10px;
        ">
            Stretch Completed
        </p>

        <h1 style="
            margin-bottom:20px;
        ">
            Good Job!
        </h1>


        <!-- MESSAGE -->

        <p class="intro-text" style="
            max-width:600px;
            margin:0 auto;
        ">

            {{ message }}

        </p>


        <!-- REWARD STATS -->

        <section style="
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
            margin-top:40px;
        ">

            <!-- POINTS -->

            <div class="stretch-card">

                <p style="
                    color:#9ca3af;
                    margin-bottom:10px;
                ">
                    Points Earned
                </p>

                <h2 style="
                    color:#34d399;
                    margin:0;
                ">
                    +{{ points_earned }}
                </h2>

            </div>


            <!-- TOTAL -->

            <div class="stretch-card">

                <p style="
                    color:#9ca3af;
                    margin-bottom:10px;
                ">
                    Total Points
                </p>

                <h2 style="
                    color:#c084fc;
                    margin:0;
                ">
                    {{ total_points }}
                </h2>

            </div>

        </section>


        <!-- BUTTONS -->

        <div style="
            display:flex;
            justify-content:center;
            gap:18px;
            margin-top:45px;
            flex-wrap:wrap;
        ">

            <a
                class="primary-button"
                href="{{ url_for('home') }}"
                style="
                    width:auto;
                    min-width:240px;
                "
            >
                Do Another Stretch
            </a>


            <a
                class="secondary-button"
                href="{{ url_for('leaderboard_page') }}"
            >
                View Leaderboard
            </a>

        </div>

    </div>

</section>

{% endblock %}
